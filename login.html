<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6366f1">

<title>Login</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="gemini-svg.jpg" class="logo">

<h2>Welcome Back!</h2>

<p>Login to continue</p>

<form>

<input
type="email"
placeholder="Enter your email"
autocomplete="email"
required>

<input
type="password"
placeholder="Enter your password"
autocomplete="current-password"
required>

</form>

<div class="mart">

<label>
<input type="checkbox">
Remember me
</label>

<p>Forgot password?</p>

</div>

<button type="button" onclick="login()">
Login
</button>

</div>

<script>
function login(){
window.location.href="index.html";
}
</script>

</body>
</html>
